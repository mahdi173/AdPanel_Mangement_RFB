<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Login | RF Backend</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --error: #ef4444;
        --success: #10b981;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Outfit', sans-serif;
      }

      body {
        background-color: var(--bg);
        background-image:
          radial-gradient(
            circle at 0% 0%,
            rgba(99, 102, 241, 0.15) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 100% 100%,
            rgba(79, 70, 229, 0.1) 0%,
            transparent 50%
          );
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
        overflow: hidden;
      }

      .login-card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 2.5rem;
        border-radius: 1.5rem;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, #818cf8, var(--primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p.subtitle {
        color: var(--text-muted);
        margin-bottom: 2rem;
        font-size: 0.9rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      input {
        width: 100%;
        padding: 0.75rem 1rem;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.75rem;
        color: var(--text);
        outline: none;
        transition: all 0.3s ease;
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        background: rgba(15, 23, 42, 0.8);
      }

      button {
        width: 100%;
        padding: 0.75rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 1rem;
      }

      button:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      }

      button:active {
        transform: translateY(0);
      }

      #message {
        margin-top: 1.5rem;
        padding: 0.75rem;
        border-radius: 0.75rem;
        font-size: 0.85rem;
        display: none;
        text-align: center;
      }

      #message.error {
        display: block;
        background: rgba(239, 68, 68, 0.1);
        color: var(--error);
        border: 1px solid rgba(239, 68, 68, 0.2);
      }

      #message.success {
        display: block;
        background: rgba(16, 185, 129, 0.1);
        color: var(--success);
        border: 1px solid rgba(16, 185, 129, 0.2);
      }

      .token-display {
        margin-top: 2rem;
        font-size: 0.75rem;
        background: #000;
        padding: 1rem;
        border-radius: 0.5rem;
        word-break: break-all;
        display: none;
        max-height: 150px;
        overflow-y: auto;
        color: #4ade80;
        border: 1px solid #166534;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Enter your credentials to access the system.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" value="test@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" value="password123" required />
        </div>
        <button type="submit" id="submitBtn">Sign In</button>
      </form>

      <div id="message"></div>
      <div id="tokenDisplay" class="token-display"></div>
    </div>

    <script>
      const loginForm = document.getElementById('loginForm');
      const messageDiv = document.getElementById('message');
      const tokenDisplay = document.getElementById('tokenDisplay');
      const submitBtn = document.getElementById('submitBtn');

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        submitBtn.textContent = 'Authenticating...';
        submitBtn.disabled = true;
        messageDiv.style.display = 'none';
        tokenDisplay.style.display = 'none';

        try {
          const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, pass }),
          });

          const data = await response.json();

          if (response.ok) {
            messageDiv.textContent = 'Login Successful!';
            messageDiv.className = 'success';
            messageDiv.style.display = 'block';

            tokenDisplay.textContent = 'JWT: ' + data.access_token;
            tokenDisplay.style.display = 'block';
          } else {
            messageDiv.textContent = data.message || 'Login failed';
            messageDiv.className = 'error';
            messageDiv.style.display = 'block';
          }
        } catch (error) {
          messageDiv.textContent = 'An error occurred. Is the server running?';
          messageDiv.className = 'error';
          messageDiv.style.display = 'block';
        } finally {
          submitBtn.textContent = 'Sign In';
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
