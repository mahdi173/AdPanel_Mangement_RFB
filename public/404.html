<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | RF Backend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex items-center justify-center p-4 overflow-hidden">
    <div class="absolute inset-0 overflow-hidden -z-10">
        <div class="absolute top-0 left-0 w-96 h-96 bg-indigo-600/20 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-rose-600/10 rounded-full blur-3xl translate-x-1/2 translate-y-1/2"></div>
    </div>

    <div class="glass p-12 rounded-3xl w-full max-w-lg shadow-2xl text-center animate-in fade-in zoom-in duration-700">
        <div class="mb-8">
            <h1 class="text-[120px] font-bold leading-none bg-gradient-to-r from-indigo-400 to-rose-400 bg-clip-text text-transparent">404</h1>
            <div class="h-1 w-24 bg-gradient-to-r from-indigo-500 to-rose-500 mx-auto rounded-full mt-4"></div>
        </div>
        
        <h2 class="text-3xl font-semibold mb-4 text-white">Lost in Space?</h2>
        <p class="text-slate-400 mb-10 text-lg">The page you are looking for doesn't exist or you don't have the necessary permissions to access it.</p>

        <div class="space-y-4 sm:space-y-0 sm:space-x-4 flex flex-col sm:flex-row justify-center">
            <a href="/login.html" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-indigo-600/20 transform active:scale-[0.98] transition-all">
                Login
            </a>
            <a href="/" class="bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold py-3 px-8 rounded-xl border border-slate-700 transform active:scale-[0.98] transition-all">
                Go Home
            </a>
        </div>
    </div>

    <!-- Decorative elements -->
    <div class="absolute top-1/4 right-1/4 w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></div>
    <div class="absolute bottom-1/4 left-1/3 w-3 h-3 bg-rose-500 rounded-full animate-bounce duration-1000"></div>
    <div class="absolute top-1/2 left-10 w-1 h-1 bg-white rounded-full opacity-50"></div>
</body>
</html>
